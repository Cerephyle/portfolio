<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joce Dashboard</title>

<style>
body{font-family:Arial;background:#0b0f14;color:#fff;margin:0}

.tabs{display:flex;background:#111}
.tab{padding:15px 25px;cursor:pointer}
.tab.active{background:#1a2230}

.subtabs{display:flex;background:#0d131c}
.subtab{padding:12px 20px;cursor:pointer}
.subtab.active{background:#1a2230}

.panel{display:none;padding:20px}
.panel.active{display:block}

.card{
background:#141b26;
padding:20px;
margin:10px 0;
border-radius:8px
}

.price{font-size:28px;font-weight:bold}

</style>
</head>

<body>

<div class="tabs">
<div class="tab active">Joce</div>
</div>

<div class="subtabs">
<div class="subtab active" onclick="show('cto')">CTO</div>
<div class="subtab" onclick="show('actions')">Actions</div>
<div class="subtab" onclick="show('alertes')">Alertes</div>
<div class="subtab" onclick="show('dividendes')">Dividendes</div>
<div class="subtab" onclick="show('plafonds')">Plafonds</div>
</div>

<div id="cto" class="panel active">
<h2>CTO Métaux</h2>

<div class="card">
Silver
<div id="silver" class="price">--</div>
</div>

<div class="card">
Or
<div id="gold" class="price">--</div>
</div>

</div>

<div id="actions" class="panel">
<h2>Actions</h2>

<div class="card">
FDJ
<div id="fdj" class="price">--</div>
</div>

<div class="card">
Sanofi
<div id="sanofi" class="price">--</div>
</div>

</div>

<div id="alertes" class="panel">
Alertes Joce
</div>

<div id="dividendes" class="panel">
Dividendes Joce
</div>

<div id="plafonds" class="panel">
Plafonds Joce
</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQUKwYqVKqTvNkXki_6mnUgt_zcLi6xG-0vqRUGlx_FiGJuH9seToVrU9SQouAjpO53mBRUtzXn9spK/pub?gid=0&single=true&output=csv";

function show(id){
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
document.querySelectorAll('.subtab').forEach(p=>p.classList.remove('active'))

document.getElementById(id).classList.add('active')
event.target.classList.add('active')
}

function parsePrice(str){
if(!str) return null
let s=str.replace(/\s/g,'').replace(',','.')
return parseFloat(s)
}

async function load(){

const r=await fetch(CSV_URL)
const t=await r.text()

const rows=t.split('\n')

rows.forEach(r=>{
const c=r.split(',')

const k=c[0]?.trim().toLowerCase()
const v=parsePrice(c[1])

if(k==="silver") silver.textContent=v+" €"
if(k==="gold") gold.textContent=v+" €"
if(k==="fdj") fdj.textContent=v+" €"
if(k==="sanofi") sanofi.textContent=v+" €"

})

}

load()
setInterval(load,300000)

</script>

</body>
</html>
